<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <title>Playyyy - Games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🎮 Playyyy</h1>
    <p>100+ Best Browser Games</p>
  </header>

  <section class="bookmarklet-banner glass">
    <div class="banner-content">
      <strong>Bookmarklet tip</strong>
      <p>Save Playyyy as a bookmarklet for instant access from your browser.</p>
    </div>
    <a class="bookmarklet-action" href="https://t.ly/lTF-_">Playyyy (drag me to your saved pages and edit this name)</a>
  </section>

  <section class="controls glass">
    <label class="search-wrap" for="search-input">
      <span>Search games</span>
      <input id="search-input" type="search" placeholder="Type a game name..." autocomplete="off">
    </label>
  </section>

  <section class="favorites-section">
    <div class="section-title">
      <h2>Favorites</h2>
      <p>Your saved games</p>
    </div>
    <div class="grid favorites-grid" id="favorites-grid"></div>
  </section>

  <section class="all-games-section">
    <div class="section-title">
      <h2>All Games</h2>
      <p>Tap the star to save a game</p>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
